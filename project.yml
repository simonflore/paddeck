name: Soundboard
options:
  bundleIdPrefix: com.soundboard
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  DSWaveformImage:
    url: https://github.com/dmrschmidt/DSWaveformImage
    from: "14.0.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.0"

targets:
  Soundboard:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Soundboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soundboard.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Soundboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: Soundboard/Soundboard.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    dependencies:
      - package: DSWaveformImage
        product: DSWaveformImage
      - package: DSWaveformImage
        product: DSWaveformImageViews
      - package: ZIPFoundation
    entitlements:
      path: Soundboard/Soundboard.entitlements
